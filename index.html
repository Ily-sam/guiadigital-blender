<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía Blender</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#e0f2fe,#fff8f0,#fff7ed);
    color:#334155;
    scroll-behavior:smooth;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 10px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:#475569;
}

.nav-logo{
    height:50px;
}

/* HEADER */
header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: linear-gradient(120deg,#fac9ad,#f7d0b9,#ffedd5);
}

header h2{
    font-size:3rem;
    color:#e45715;
}

/* BOTÓN */
.btn{
    margin-top:20px;
    padding:14px 40px;
    border-radius:30px;
    background:#fb923c;
    color:white;
    text-decoration:none;
}

/* SECCIONES */
section{
    padding:80px 5%;
}

/* PDF */
.pdf-container{
    width:90%;
    height:80vh;
    margin:auto;
}

.pdf-container iframe{
    width:100%;
    height:100%;
    border-radius:20px;
}

/* GALERÍA */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:20px;
}

/* TEAM */
.team{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.member img{
    width:120px;
    height:120px;
    border-radius:50%;
}

footer{
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>
    <img src="logo.jpg" class="nav-logo">
  </div>
  <ul>
    <li><a href="#inicio">Inicio</a></li>
    <li><a href="#guia">Guía</a></li>
    <li><a href="#galeria">Galería</a></li>
    <li><a href="#equipo">Equipo</a></li>
  </ul>
</nav>

<!-- PORTADA -->
<header id="inicio">
<h2>Guía Digital Blender</h2>
<a href="#guia" class="btn">Ver Guía</a>
</header>

<!-- PDF -->
<section id="guia">
<h2>Guía Digital</h2>

<div class="pdf-container">
<iframe src="Tesis%20Guia%20didactica-comprimido.pdf"></iframe>
</div>

</section>

<!-- GALERÍA -->
<section id="galeria">
<h2>Galería</h2>

<div class="gallery">
<img src="particulas.png">
<img src="kirby.png">
<img src="escenario.png">
</div>

</section>

<!-- EQUIPO -->
<section id="equipo">
<h2>Equipo</h2>

<div class="team">
<div class="member">
<img src="Daya.jpeg">
<p>Dayanna</p>
</div>

<div class="member">
<img src="Dome.jpeg">
<p>Domenica</p>
</div>
</div>

</section>

<footer>
<p>Proyecto Blender 2026</p>
</footer>

</body>
</html>
